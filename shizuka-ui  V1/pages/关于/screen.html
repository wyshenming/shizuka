<!-- Interactive Atmospheric Script -->
<script>
        // Micro-interaction: Mouse tracking subtle parallax for the poetic text
        document.addEventListener('mousemove', (e) => {
            const text = document.querySelector('.poetic-fade-in');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            
            text.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Suppression Logic: This is a sub-page/linear page, so we exclude the BottomNavBar as per the "Destination" rule.
