<!DOCTYPE html><html class="light" lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            transition: all 0.3s ease;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .input-underline {
            border-bottom: 1px solid rgba(113, 120, 122, 0.2);
            transition: border-color 0.4s ease;
        }
        .input-underline:focus {
            outline: none;
            border-color: #41646b;
        }
        .breathing-animation {
            animation: breathe 8s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        body {
            background-color: #f8f9fa;
            color: #191c1d;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#ebdef2",
                        "inverse-on-surface": "#f0f1f2",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e7e8e9",
                        "outline-variant": "#c1c8c9",
                        "surface-tint": "#41646b",
                        "secondary-fixed-dim": "#cec2d5",
                        "on-secondary": "#ffffff",
                        "outline": "#71787a",
                        "primary-fixed": "#c3e9f1",
                        "on-tertiary-fixed-variant": "#3f4b30",
                        "on-surface": "#191c1d",
                        "on-secondary-container": "#6a6171",
                        "surface-bright": "#f8f9fa",
                        "primary-container": "#a5cad2",
                        "primary-fixed-dim": "#a8cdd5",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#becba8",
                        "background": "#f8f9fa",
                        "on-primary-container": "#32565d",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#1f1926",
                        "tertiary-fixed": "#dae8c3",
                        "secondary-fixed": "#ebdef2",
                        "inverse-surface": "#2e3132",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "surface-container-highest": "#e1e3e4",
                        "primary": "#41646b",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#141f08",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "on-primary-fixed": "#001f24",
                        "inverse-primary": "#a8cdd5",
                        "tertiary": "#566246",
                        "on-surface-variant": "#41484a",
                        "on-primary-fixed-variant": "#284c53",
                        "tertiary-container": "#bbc9a6",
                        "on-background": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-container": "#495539",
                        "secondary": "#645b6b",
                        "surface-container": "#edeeef",
                        "surface": "#f8f9fa",
                        "on-secondary-fixed-variant": "#4c4453"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max-width-desktop": "800px",
                        "dialogue-spacing": "32px",
                        "unit": "4px",
                        "container-padding": "24px",
                        "element-gap": "16px"
                    },
                    "fontFamily": {
                        "display-name": ["Noto Serif SC"],
                        "ui-label-lg": ["Plus Jakarta Sans"],
                        "dialogue-main": ["Plus Jakarta Sans"],
                        "system-msg": ["Plus Jakarta Sans"],
                        "ui-label-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display-name": ["24px", {"lineHeight": "32px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "ui-label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "dialogue-main": ["18px", {"lineHeight": "1.8", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "system-msg": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "ui-label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="min-h-screen font-ui-label-lg text-on-surface overflow-x-hidden">
<!-- Subtle Background Shader -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container/20 blur-[120px] breathing-animation"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/20 blur-[100px] breathing-animation" style="animation-delay: -2s;"></div>
</div>
<!-- Navigation Bar (TopAppBar) -->
<nav class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-outline-variant/30">
<div class="flex justify-between items-center px-container-padding h-16 w-full max-w-max-width-desktop mx-auto">
<button class="active:scale-95 duration-200 flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors" onclick="window.history.back()">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios</span>
</button>
<h1 class="font-display-name text-[20px] text-on-surface font-semibold tracking-wider">新建角色</h1>
<button class="active:scale-95 duration-200 font-ui-label-lg text-primary font-bold hover:opacity-80 transition-opacity">
                保存
            </button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="pt-24 pb-12 px-container-padding max-w-max-width-desktop mx-auto">
<div class="space-y-12">
<!-- Section 1: Basic Info -->
<section class="space-y-10 animate-in fade-in duration-700 slide-in-from-bottom-4">
<div class="flex flex-col items-center">
<!-- Avatar Upload Area -->
<div class="relative group cursor-pointer">
<div class="w-28 h-28 rounded-full border-2 border-dashed border-outline-variant flex flex-col items-center justify-center bg-surface-container-lowest transition-all duration-300 group-hover:border-primary group-hover:bg-primary-container/5 overflow-hidden">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary mb-1">add_a_photo</span>
<span class="text-ui-label-sm text-on-surface-variant opacity-60">点击上传</span>
</div>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file">
</div>
</div>
<div class="space-y-8">
<!-- Character Name -->
<div class="space-y-2">
<label class="text-ui-label-sm text-on-surface-variant/60 font-medium px-1">角色姓名</label>
<input class="w-full bg-transparent py-3 px-1 text-dialogue-main input-underline focus:placeholder-transparent transition-all" placeholder="例如：雪之下雪乃" type="text">
</div>
<!-- Title / Nickname -->
<div class="space-y-2">
<label class="text-ui-label-sm text-on-surface-variant/60 font-medium px-1">角色称呼 / 头衔</label>
<input class="w-full bg-transparent py-3 px-1 text-dialogue-main input-underline focus:placeholder-transparent transition-all" placeholder="例如：侍奉部部长" type="text">
</div>
</div>
</section>
<!-- Section 2: Detailed Settings -->
<section class="space-y-10 pt-4 animate-in fade-in duration-700 delay-200 slide-in-from-bottom-4">
<div class="flex items-center gap-3 opacity-40">
<div class="h-px flex-1 bg-outline-variant"></div>
<span class="text-ui-label-sm font-display-name tracking-[0.2em]">详细设定</span>
<div class="h-px flex-1 bg-outline-variant"></div>
</div>
<div class="space-y-10">
<!-- Personality -->
<div class="space-y-3">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-[18px] text-primary">auto_awesome</span>
<label class="text-ui-label-lg font-semibold text-on-surface-variant">角色性格</label>
<button class="ml-auto text-on-surface-variant/40 hover:text-error transition-colors active:scale-95"><span class="material-symbols-outlined text-[20px]">close</span></button></div>
<textarea class="w-full bg-surface-container-lowest/50 backdrop-blur-sm rounded-xl p-4 text-dialogue-main-mobile md:text-dialogue-main border border-outline-variant/30 focus:outline-none focus:border-primary/40 focus:ring-4 focus:ring-primary/5 transition-all resize-none" placeholder="描述角色的核心气质与性格走向..." rows="3"></textarea>
</div>
<!-- Background/Experience -->
<div class="space-y-3">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-[18px] text-primary">history_edu</span>
<label class="text-ui-label-lg font-semibold text-on-surface-variant">世界观背景 / 经历</label>
<button class="ml-auto text-on-surface-variant/40 hover:text-error transition-colors active:scale-95"><span class="material-symbols-outlined text-[20px]">close</span></button></div>
<textarea class="w-full bg-surface-container-lowest/50 backdrop-blur-sm rounded-xl p-4 text-dialogue-main-mobile md:text-dialogue-main border border-outline-variant/30 focus:outline-none focus:border-primary/40 focus:ring-4 focus:ring-primary/5 transition-all resize-none" placeholder="角色从何处来，曾经历过哪些足以改变人生的事件？" rows="4"></textarea>
</div>
<!-- Language Style -->
<div class="space-y-3">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-[18px] text-primary">chat_paste_go</span>
<label class="text-ui-label-lg font-semibold text-on-surface-variant">语言风格 / 口头禅</label>
<button class="ml-auto text-on-surface-variant/40 hover:text-error transition-colors active:scale-95"><span class="material-symbols-outlined text-[20px]">close</span></button></div>
<textarea class="w-full bg-surface-container-lowest/50 backdrop-blur-sm rounded-xl p-4 text-dialogue-main-mobile md:text-dialogue-main border border-outline-variant/30 focus:outline-none focus:border-primary/40 focus:ring-4 focus:ring-primary/5 transition-all resize-none" placeholder="角色的说话方式。是温文尔雅，还是充满锐气？" rows="3"></textarea>
</div>
<!-- New Field Template (Hidden) -->
<template id="custom-field-template"><div class="space-y-3 animate-in fade-in duration-300">
        <div class="flex items-center gap-2 px-1">
            <span class="material-symbols-outlined text-[18px] text-primary">edit_note</span>
            <input type="text" class="bg-transparent border-none p-0 font-semibold text-on-surface-variant focus:ring-0 text-ui-label-lg flex-1" placeholder="字段名称">
            <button class="text-on-surface-variant/40 hover:text-error transition-colors active:scale-95" onclick="this.closest('.space-y-3').remove()">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>
        <textarea class="w-full bg-surface-container-lowest/50 backdrop-blur-sm rounded-xl p-4 text-dialogue-main-mobile md:text-dialogue-main border border-outline-variant/30 focus:outline-none focus:border-primary/40 focus:ring-4 focus:ring-primary/5 transition-all resize-none" placeholder="请输入内容..." rows="3"></textarea>
    </div></template>

<!-- Add Custom Field Button -->
<div class="pt-4 flex justify-center">
    <button class="flex items-center gap-2 px-6 py-3 rounded-full border border-outline-variant/30 bg-surface-container-low/50 text-on-surface-variant hover:bg-primary-container/10 hover:border-primary/30 transition-all duration-300 active:scale-95 group" onclick="const template = document.getElementById('custom-field-template'); const clone = template.content.cloneNode(true); this.parentElement.before(clone);">
        <span class="material-symbols-outlined text-[20px] group-hover:text-primary">add</span>
        <span class="text-ui-label-lg">添加自定义字段</span>
    </button>
</div></div>
</section>
</div>
</main>
<!-- Visual Polish: Floating Decorative Elements -->
<div class="fixed top-1/4 -left-12 w-24 h-24 border border-primary/10 rounded-full blur-[1px] rotate-45 pointer-events-none opacity-40"></div>
<div class="fixed bottom-1/4 -right-12 w-48 h-48 border-t border-r border-secondary/10 rounded-full blur-[2px] pointer-events-none opacity-30"></div>
<script>
        // Simple Interaction Feedback
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                // Future expansion for haptic feedback or visual cues
            });
        });

        // Auto-save hint (UX Micro-interaction)
        let saveTimeout;
        const saveBtn = document.querySelector('nav button:last-child');
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(saveTimeout);
                saveBtn.textContent = '保存中...';
                saveBtn.classList.add('opacity-50');
                
                saveTimeout = setTimeout(() => {
                    saveBtn.textContent = '保存';
                    saveBtn.classList.remove('opacity-50');
                }, 1500);
            });
        });
    </script>




</body></html>
