<body class="text-on-surface antialiased min-h-screen flex flex-col hide-scrollbar">
<!-- TopAppBar -->
<header class="bg-surface/70 dark:bg-surface-dim/70 backdrop-blur-xl fixed top-0 w-full z-50 border-b border-outline-variant/30 flex justify-center items-center px-container-padding h-16"><button class="absolute left-container-padding flex items-center justify-center text-primary hover:bg-primary-container/20 rounded-full w-10 h-10 transition-colors" aria-label="返回">
  <span class="material-symbols-outlined">chevron_left</span>
</button>
<h1 class="font-display-name text-display-name text-primary tracking-widest text-center">回忆</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-padding max-w-[680px] w-full mx-auto flex flex-col gap-16 md:gap-24 relative z-10 pt-8 pb-8">
<!-- Header Text -->
<div class="text-center mb-4"><p class="font-display-name text-on-surface-variant/60 text-[14px] tracking-[0.2em] italic">那些被光影镌刻的无声对白</p></div>
<!-- Memory Card 1 -->
<article class="glass-card rounded-xl overflow-hidden group transition-transform duration-500 hover:-translate-y-1">

<div class="p-8 md:p-10 text-center"><div class="mb-4 inline-block bg-secondary-container/50 backdrop-blur-md px-3 py-1 rounded-full border border-outline-variant/30"><span class="font-ui-label-sm text-ui-label-sm text-primary tracking-widest uppercase">Chapter 01</span></div>
<h3 class="font-display-name text-[20px] leading-[28px] font-semibold text-on-surface mb-4">尘埃落定的午后</h3>
<p class="font-dialogue-main text-dialogue-main text-on-surface-variant max-w-md mx-auto">
                    阳光穿透了百叶窗的缝隙，在这间只有纸张翻动声的屋子里，时间仿佛失去了流逝的意义。那是我第一次，听懂了沉默。
                </p>
<div class="mt-8 flex justify-center items-center gap-2 text-outline/50">
<div class="w-12 h-[1px] bg-outline-variant/50"></div>
<span class="material-symbols-outlined text-[14px]">local_library</span>
<div class="w-12 h-[1px] bg-outline-variant/50"></div>
</div>
</div>
</article>
<!-- Memory Card 2 -->
<article class="glass-card rounded-xl overflow-hidden group transition-transform duration-500 hover:-translate-y-1">

<div class="p-8 md:p-10 text-center"><div class="mb-4 inline-block bg-secondary-container/50 backdrop-blur-md px-3 py-1 rounded-full border border-outline-variant/30"><span class="font-ui-label-sm text-ui-label-sm text-primary tracking-widest uppercase">Chapter 03</span></div>
<h3 class="font-display-name text-[20px] leading-[28px] font-semibold text-on-surface mb-4">雨水模糊的边界</h3>
<p class="font-dialogue-main text-dialogue-main text-on-surface-variant max-w-md mx-auto">
                    杯中的咖啡渐渐失去温度，窗外的世界被雨水涂抹成抽象的画作。你没有说话，只是静静地看着玻璃上的倒影，那一刻，世界变得很小。
                </p>
<div class="mt-8 flex justify-center items-center gap-2 text-outline/50">
<div class="w-12 h-[1px] bg-outline-variant/50"></div>
<span class="material-symbols-outlined text-[14px]">water_drop</span>
<div class="w-12 h-[1px] bg-outline-variant/50"></div>
</div>
</div>
</article>
<!-- Memory Card 3 -->
<article class="glass-card rounded-xl overflow-hidden group transition-transform duration-500 hover:-translate-y-1 mb-8">

<div class="p-8 md:p-10 text-center"><div class="mb-4 inline-block bg-secondary-container/50 backdrop-blur-md px-3 py-1 rounded-full border border-outline-variant/30"><span class="font-ui-label-sm text-ui-label-sm text-primary tracking-widest uppercase">Chapter 05</span></div>
<h3 class="font-display-name text-[20px] leading-[28px] font-semibold text-on-surface mb-4">未奏响的休止符</h3>
<p class="font-dialogue-main text-dialogue-main text-on-surface-variant max-w-md mx-auto">
                    空旷的礼堂里，黑白琴键反射着微弱的光。没有旋律响起，但空气中却弥漫着某种即将倾诉的情感，比任何音乐都更加震耳欲聋。
                </p>
<div class="mt-8 flex justify-center items-center gap-2 text-outline/50">
<div class="w-12 h-[1px] bg-outline-variant/50"></div>
<span class="material-symbols-outlined text-[14px]">music_note</span>
<div class="w-12 h-[1px] bg-outline-variant/50"></div>
</div>
</div>
</article>
</main>
